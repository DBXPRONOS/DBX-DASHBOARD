name: DBX Daily Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome (pour le scraping FBref via soccerdata/Selenium)
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install requests pandas numpy scipy soccerdata beautifulsoup4 lxml

      - name: Generate picks
        run: python $GITHUB_WORKSPACE/generate_picks.py

      - name: Commit picks.json
        run: |
          git config user.name "DBX Bot"
          git config user.email "bot@dbxpronos.com"
          git add picks.json
          git diff --staged --quiet || git commit -m "DBX update $(date +'%Y-%m-%d %H:%M')"
          git push
